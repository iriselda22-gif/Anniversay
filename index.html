<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
h1 {
    color: #e91e63;
}
p {
    font-size: 1.2em;
    color: #444;
}
.heart {
    font-size: 3em;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    50% { transform: scale(1.2); }
}
</style>
</head>
<body>
<div class="card">
    <div class="heart">❤️</div>
    <h1>Happy 4 Anniversary!</h1>
    <p>I love you more every day.</p>
    <p>Thank you for making my life brighter. Here's to many more anniversaries together Goosie. ❤️</p>
</div>
</body>
</html>
